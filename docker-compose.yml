version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyboard
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: studyboard
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U studyboard']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://studyboard:changeme@postgres:5432/studyboard
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_only_access_secret_change_in_prod_please_32chars
      JWT_REFRESH_SECRET: dev_only_refresh_secret_change_in_prod_please_32ch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
