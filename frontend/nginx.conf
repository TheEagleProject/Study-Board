server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a real file serves index.html so
    # client-side routing (react-router) handles it instead of nginx 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets; index.html itself is never
    # cached so deploys are picked up immediately.
    location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
